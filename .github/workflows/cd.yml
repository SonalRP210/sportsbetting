name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"
      compose_file:
        description: "Docker Compose file on target host"
        required: true
        default: "docker-compose.loadtest.yml"

permissions:
  contents: read

concurrency:
  group: cd-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH + Docker Compose
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    environment: production
    steps:
      - name: Resolve deployment values
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
            echo "compose_file=${{ github.event.inputs.compose_file }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "compose_file=docker-compose.loadtest.yml" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy on target host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_APP_DIR }}"
            git fetch --all --prune
            git checkout "${{ steps.vars.outputs.branch }}"
            git pull --ff-only origin "${{ steps.vars.outputs.branch }}"
            docker compose -f "${{ steps.vars.outputs.compose_file }}" pull
            docker compose -f "${{ steps.vars.outputs.compose_file }}" up -d --remove-orphans
            docker image prune -f
