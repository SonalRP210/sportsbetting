version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sportsbetting-postgres-loadtest
    environment:
      POSTGRES_DB: sportsbetting
      POSTGRES_USER: sportsbetting
      POSTGRES_PASSWORD: sportsbetting
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportsbetting"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # Redis (optional - for rate limiting and odds pub/sub)
  redis:
    image: redis:7-alpine
    container_name: sportsbetting-redis-loadtest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # Kafka (optional - for odds buffering)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sportsbetting-zookeeper-loadtest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sportsbetting-kafka-loadtest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Sports Betting Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sportsbetting-app-loadtest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: loadtest
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sportsbetting
      SPRING_DATASOURCE_USERNAME: sportsbetting
      SPRING_DATASOURCE_PASSWORD: sportsbetting
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Enable Redis for global rate limiting and odds pub/sub
      APP_REDIS_ENABLED: "true"
      # Optional: Enable Kafka odds buffering for burst testing
      APP_KAFKA_ODDS_ENABLED: "false"
      # JVM tuning for load testing
      JAVA_OPTS: >-
        -Xms1g -Xmx2g
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/tmp/heapdump.hprof
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Prometheus - Metrics aggregation
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: sportsbetting-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=24h'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    ports:
      - "9090:9090"
    volumes:
      - ./loadtest/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:10.2.0
    container_name: sportsbetting-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=LiveLife23#
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ./loadtest/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./loadtest/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # k6 - Load Testing (run manually with different profiles)
  # Usage:
  #   docker compose -f docker-compose.loadtest.yml run --rm k6-rate-limit
  #   docker compose -f docker-compose.loadtest.yml run --rm k6-bets
  #   docker compose -f docker-compose.loadtest.yml run --rm k6-settlement
  #   docker compose -f docker-compose.loadtest.yml run --rm k6-odds
  
  k6-rate-limit:
    image: grafana/k6:0.48.0
    container_name: sportsbetting-k6-rate-limit
    command: run --tag test=rate_limit /scripts/rate-limit-test.js
    volumes:
      - ./loadtest/k6:/scripts:ro
      - ./loadtest/k6/results:/results
    environment:
      - K6_OUT=experimental-prometheus-rw
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
      - K6_PROMETHEUS_RW_TREND_STATS=p(90),p(95),p(99),avg,min,max
      - TARGET_URL=http://app:8080
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - manual

  k6-bets:
    image: grafana/k6:0.48.0
    container_name: sportsbetting-k6-bets
    command: run --tag test=bet_placement /scripts/bet-placement-test.js
    volumes:
      - ./loadtest/k6:/scripts:ro
      - ./loadtest/k6/results:/results
    environment:
      - K6_OUT=experimental-prometheus-rw
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
      - K6_PROMETHEUS_RW_TREND_STATS=p(90),p(95),p(99),avg,min,max
      - TARGET_URL=http://app:8080
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - manual

  k6-settlement:
    image: grafana/k6:0.48.0
    container_name: sportsbetting-k6-settlement
    command: run --tag test=settlement /scripts/settlement-test.js
    volumes:
      - ./loadtest/k6:/scripts:ro
      - ./loadtest/k6/results:/results
    environment:
      - K6_OUT=experimental-prometheus-rw
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
      - K6_PROMETHEUS_RW_TREND_STATS=p(90),p(95),p(99),avg,min,max
      - TARGET_URL=http://app:8080
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - manual

  k6-odds:
    image: grafana/k6:0.48.0
    container_name: sportsbetting-k6-odds
    command: run --tag test=odds_burst /scripts/odds-burst-test.js
    volumes:
      - ./loadtest/k6:/scripts:ro
      - ./loadtest/k6/results:/results
    environment:
      - K6_OUT=experimental-prometheus-rw
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
      - K6_PROMETHEUS_RW_TREND_STATS=p(90),p(95),p(99),avg,min,max
      - TARGET_URL=http://app:8080
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - manual

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: sportsbetting-loadtest-network
