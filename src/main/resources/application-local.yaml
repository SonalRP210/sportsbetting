spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sportsbetting}
    username: ${SPRING_DATASOURCE_USERNAME:sportsbetting}
    password: ${SPRING_DATASOURCE_PASSWORD:sportsbetting}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.sonal.sportsbetting: INFO

app:
  redis:
    enabled: ${APP_REDIS_ENABLED:true}
