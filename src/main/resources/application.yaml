server:
  port: 8080

spring:
  application:
    name: sportsbetting
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.sonal.sportsbetting.model"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sportsbetting}
    username: ${SPRING_DATASOURCE_USERNAME:sportsbetting}
    password: ${SPRING_DATASOURCE_PASSWORD:sportsbetting}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: "INFO"
    com.sonal.sportsbetting: "INFO"
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}]"
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p ${PID:- } [%t] traceId=%X{traceId:-} %c{40} : %m%n%wEx"

api:
  version: v1
  base-path: /api/${api.version}

app:
  outbox:
    poll-interval-ms: 1000
  redis:
    enabled: false
    rate-limit-key-prefix: "rate_limit:"
    odds-channel: "odds:updates"
  rate-limit:
    requests: 120
    window-seconds: 60
  betting:
    bet-id-prefix: "BET-"
    money-scale: 2
    money-rounding-mode: HALF_UP
    idempotency-key-max-length: 128
  pagination:
    default-page: 0
    default-page-size: 20
  correlation:
    request-id-header: X-Request-Id
    response-id-header: X-Request-Id
    mdc-key: traceId
  http:
    idempotency-key-header: Idempotency-Key
  odds:
    composite-key-separator: ":"
  kafka:
    odds-enabled: false
    odds-topic: odds-feed-events
    odds-group-id: sportsbetting-odds-consumers
  settlement:
    lock-timeout-ms: 2000
  retry:
    persistence:
      max-attempts: 3
      backoff-millis: 50
    settlement:
      max-attempts: 3
      backoff-millis: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

springdoc:
  api-docs:
    path: /v3/api-docs
