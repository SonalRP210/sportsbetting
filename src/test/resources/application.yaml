# Test defaults (slice tests may not load full main application.yaml)
api:
  version: v1
  base-path: /api/${api.version}

spring:
  application:
    name: sportsbetting
  # DB-backed tests use Testcontainers Postgres via @DynamicPropertySource (PostgresContainerProvider).
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  rate-limit:
    requests: 10000
    window-seconds: 60
  betting:
    bet-id-prefix: "BET-"
    money-scale: 2
    money-rounding-mode: HALF_UP
    idempotency-key-max-length: 128
  pagination:
    default-page: 0
    default-page-size: 20
  correlation:
    request-id-header: X-Request-Id
    response-id-header: X-Request-Id
    mdc-key: traceId
  http:
    idempotency-key-header: Idempotency-Key
  odds:
    composite-key-separator: ":"
  retry:
    persistence:
      max-attempts: 3
      backoff-millis: 50
