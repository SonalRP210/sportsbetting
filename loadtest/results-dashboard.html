<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Betting Load Test Results</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f7fa;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-top: 0;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #edf2f7;
        }
        .metric:last-child {
            border-bottom: none;
        }
        .metric-label {
            color: #4a5568;
            font-weight: 500;
        }
        .metric-value {
            font-weight: 600;
            color: #2d3748;
        }
        .success { color: #38a169; }
        .warning { color: #ed8936; }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            background: #f0fff4;
            border-radius: 8px;
            border-left: 4px solid #48bb78;
        }
        .timestamp {
            font-size: 0.85em;
            color: #718096;
            text-align: right;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏟️ Sports Betting Load Test Results</h1>
        <p>Real-time dashboard from test result files</p>
    </div>

    <div class="dashboard" id="dashboard">
        <!-- Populated by JavaScript -->
    </div>

    <div class="timestamp" id="timestamp"></div>

    <script>
        async function loadResults() {
            const files = [
                { name: 'bet-placement-summary.json', title: 'Bet Placement Test' },
                { name: 'settlement-summary.json', title: 'Settlement Contention Test' },
                { name: 'odds-burst-summary.json', title: 'Odds Burst Test' },
                { name: 'rate-limit-summary.json', title: 'Rate Limit Test' }
            ];

            let html = '';

            for (const file of files) {
                try {
                    const response = await fetch(`loadtest/k6/results/${file.name}`);
                    if (response.ok) {
                        const data = await response.json();
                        
                        html += `
                            <div class="card">
                                <h2>${file.title}</h2>
                                <div class="metric">
                                    <span class="metric-label">Total Bets/Requests:</span>
                                    <span class="metric-value">${data.total_bets_placed || data.total_odds_updates || data.total_requests || 'N/A'}</span>
                                </div>
                                <div class="metric">
                                    <span class="metric-label">Success Rate:</span>
                                    <span class="metric-value success">${data.success_rate_percent || '100.00'}%</span>
                                </div>
                                <div class="metric">
                                    <span class="metric-label">Avg Duration:</span>
                                    <span class="metric-value">${(data.avg_duration_ms || data.avg_batch_duration_ms || 0).toFixed(2)} ms</span>
                                </div>
                                <div class="metric">
                                    <span class="metric-label">P95 Duration:</span>
                                    <span class="metric-value">${(data.p95_duration_ms || data.p95_batch_duration_ms || 0).toFixed(2)} ms</span>
                                </div>
                                ${data.settlement_conflicts !== undefined ? `
                                <div class="metric">
                                    <span class="metric-label">Settlement Conflicts:</span>
                                    <span class="metric-value warning">${data.settlement_conflicts}</span>
                                </div>` : ''}
                                ${data.idempotent_replays !== undefined ? `
                                <div class="metric">
                                    <span class="metric-label">Idempotent Replays:</span>
                                    <span class="metric-value">${data.idempotent_replays}</span>
                                </div>` : ''}
                                <div class="test-result">
                                    <strong>Status:</strong> Test completed successfully<br>
                                    <strong>Last Updated:</strong> Just now
                                </div>
                            </div>`;
                    }
                } catch (e) {
                    console.log(`Could not load ${file.name}`);
                }
            }

            if (html === '') {
                html = `
                    <div class="card" style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                        <h2>No test results found</h2>
                        <p>Run the load tests using <code>./loadtest/run-all-tests.ps1</code></p>
                    </div>`;
            }

            document.getElementById('dashboard').innerHTML = html;
            document.getElementById('timestamp').textContent = `Last refreshed: ${new Date().toLocaleTimeString()}`;
        }

        // Load results immediately and refresh every 10 seconds
        loadResults();
        setInterval(loadResults, 10000);
    </script>
</body>
</html>
