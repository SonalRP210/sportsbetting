spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sportsbetting}
    username: ${SPRING_DATASOURCE_USERNAME:sportsbetting}
    password: ${SPRING_DATASOURCE_PASSWORD:sportsbetting}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.sonal.sportsbetting: INFO
