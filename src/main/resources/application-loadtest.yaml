# Spring Profile for Load Testing

spring:
  jpa:
    show-sql: false  # Disable SQL logging to reduce overhead
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20  # Batch inserts for better performance
        order_inserts: true
        order_updates: true
  datasource:
    hikari:
      maximum-pool-size: 50  # Increase connection pool for high concurrency
      minimum-idle: 10
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 60000

logging:
  level:
    root: "WARN"
    com.sonal.sportsbetting: "INFO"
    org.springframework.web: "WARN"
    org.hibernate: "WARN"
    io.micrometer: "WARN"

# Load test specific settings
app:
  outbox:
    poll-interval-ms: 500  # Faster event processing
  rate-limit:
    # All k6 VUs share one source IP in Docker. Set the cap high enough that
    # only the dedicated rate-limit-test.js ever sees 429s. The other three
    # tests (bets, settlement, odds) should never be throttled by this limit.
    requests: 100000
    window-seconds: 60
