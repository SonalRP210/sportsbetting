name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"
      compose_file:
        description: "Docker Compose file on target host"
        required: true
        default: "docker-compose.loadtest.yml"

permissions:
  contents: read

concurrency:
  group: cd-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH + Docker Compose
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    environment: production
    steps:
      - name: Resolve deployment values
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
            echo "compose_file=${{ github.event.inputs.compose_file }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
            echo "compose_file=docker-compose.loadtest.yml" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate deploy configuration
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
        run: |
          set -euo pipefail
          missing=0
          for v in DEPLOY_HOST DEPLOY_PORT DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_APP_DIR; do
            if [ -z "${!v:-}" ]; then
              echo "::error title=Missing secret::$v is not configured. Add it in Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Deployment skipped because required secrets are missing."
            exit 1
          fi

      - name: Show deployment target
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
        run: |
          echo "Deploying branch '${{ steps.vars.outputs.branch }}' using '${{ steps.vars.outputs.compose_file }}'"
          echo "Target host: ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PORT}"
          echo "Target app dir: ${DEPLOY_APP_DIR}"

      - name: Deploy on target host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_APP_DIR }}"
            git fetch --all --prune
            git checkout "${{ steps.vars.outputs.branch }}"
            git pull --ff-only origin "${{ steps.vars.outputs.branch }}"
            docker compose -f "${{ steps.vars.outputs.compose_file }}" pull
            docker compose -f "${{ steps.vars.outputs.compose_file }}" up -d --remove-orphans
            docker image prune -f
